<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Диагностика консолидации</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px; }
        button:hover { background: #2980b9; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #3498db; color: white; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        .warning { background: #fff3cd; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; font-size: 12px; }
    
        /* Mobile adaptation - Tablets */
        @media (max-width: 1200px) {
            .container {
                max-width: 100%;
            }
            
            .table-container {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
        }

        /* Mobile adaptation - Medium screens */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header, .container {
                padding: 15px 20px;
                margin-bottom: 15px;
            }

            h1 {
                font-size: 20px;
                margin-bottom: 8px;
            }

            h2 {
                font-size: 16px;
            }

            .subtitle {
                font-size: 12px;
            }

            .branch-selector, .btn-group, .controls {
                gap: 8px;
                margin-top: 10px;
            }

            .btn, button, .branch-btn {
                padding: 10px 16px;
                font-size: 12px;
            }

            .info-bar, .status-bar {
                padding: 12px 15px;
                gap: 10px;
            }
            
            table {
                font-size: 11px;
            }

            th, td {
                padding: 6px 4px;
            }

            .section-footer {
                padding: 12px;
                gap: 8px;
            }

            input, select, textarea {
                padding: 6px;
                font-size: 12px;
            }
        }

        /* Mobile adaptation - Small screens */
        @media (max-width: 480px) {
            body {
                padding: 5px;
            }

            .header, .container {
                padding: 12px 15px;
                border-radius: 10px;
            }

            h1 {
                font-size: 18px;
            }

            h2 {
                font-size: 14px;
            }

            .subtitle {
                font-size: 11px;
                margin-bottom: 10px;
            }

            .branch-selector, .btn-group, .controls {
                flex-direction: column;
                gap: 6px;
            }

            .btn, button, .branch-btn {
                width: 100%;
                padding: 10px;
                font-size: 13px;
            }

            .info-bar, .status-bar {
                flex-direction: column;
                padding: 10px;
                gap: 8px;
            }

            table {
                font-size: 10px;
            }

            th, td {
                padding: 4px 2px;
            }

            .section-footer {
                flex-direction: column;
                padding: 10px;
            }

            input, select, textarea {
                font-size: 11px;
                padding: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Диагностика консолидации</h1>
        
        <button onclick="checkAll()">Проверить все ключи</button>
        <button onclick="testConsolidation()">Тест консолидации РБ</button>
        <button onclick="showAllKeys()">Показать все ключи localStorage</button>
        
        <div id="result"></div>
    </div>

    <script>
        function checkAll() {
            const result = document.getElementById('result');
            const branches = ['almaty', 'uralsk', 'astana'];
            
            const rbSheets = [
                'rb_svod',
                'rb_income',
                'rb_fzp',
                'rb_kalkulyacia',
                'rb_svodnaya',
                'rb_plan_komandir'
            ];
            
            const puSheets = [
                'pu_svod_2026',
                'pu_ss_dotacia',
                'pu_income_pu',
                'pu_income_dt',
                'pu_income_dop',
                'pu_fot',
                'pu_grafik',
                'pu_kalkulyacia',
                'pu_plan_rk',
                'pu_plan_abroad'
            ];
            
            const other = ['fot'];
            
            let html = '<h2>Проверка наличия ключей в localStorage</h2>';
            html += '<table><tr><th>Ключ</th><th>Алматы</th><th>Уральск</th><th>Астана</th><th>Кол-во ячеек</th></tr>';
            
            // Проверяем РБ
            html += '<tr><th colspan="5" style="background: #2c3e50;">РЕСПУБЛИКАНСКИЙ БЮДЖЕТ (RB)</th></tr>';
            rbSheets.forEach(sheet => {
                html += '<tr>';
                html += `<td><strong>${sheet}</strong></td>`;
                
                let cellCounts = {};
                branches.forEach(branch => {
                    const key = `${sheet}_${branch}`;
                    const data = localStorage.getItem(key);
                    const exists = data !== null;
                    
                    if (exists) {
                        try {
                            const parsed = JSON.parse(data);
                            cellCounts[branch] = Object.keys(parsed.cells || {}).length;
                        } catch (e) {
                            cellCounts[branch] = 'ошибка';
                        }
                    }
                    
                    html += `<td class="${exists ? 'success' : 'error'}">${exists ? '✅ Есть' : '❌ Нет'}</td>`;
                });
                
                html += `<td>${Object.values(cellCounts).join(' / ')}</td>`;
                html += '</tr>';
            });
            
            // Проверяем ПУ
            html += '<tr><th colspan="5" style="background: #2c3e50;">ПОДУШЕВОЕ ФИНАНСИРОВАНИЕ (PU)</th></tr>';
            puSheets.forEach(sheet => {
                html += '<tr>';
                html += `<td><strong>${sheet}</strong></td>`;
                
                let cellCounts = {};
                branches.forEach(branch => {
                    const key = `${sheet}_${branch}`;
                    const data = localStorage.getItem(key);
                    const exists = data !== null;
                    
                    if (exists) {
                        try {
                            const parsed = JSON.parse(data);
                            if (parsed.cells) {
                                cellCounts[branch] = Object.keys(parsed.cells).length;
                            } else if (parsed.rows) {
                                cellCounts[branch] = Array.isArray(parsed.rows) ? parsed.rows.length : Object.keys(parsed.rows).length;
                            } else {
                                cellCounts[branch] = Object.keys(parsed).length;
                            }
                        } catch (e) {
                            cellCounts[branch] = 'ошибка';
                        }
                    }
                    
                    html += `<td class="${exists ? 'success' : 'error'}">${exists ? '✅ Есть' : '❌ Нет'}</td>`;
                });
                
                html += `<td>${Object.values(cellCounts).join(' / ')}</td>`;
                html += '</tr>';
            });
            
            // Проверяем прочие
            html += '<tr><th colspan="5" style="background: #2c3e50;">ПРОЧИЕ</th></tr>';
            other.forEach(sheet => {
                html += '<tr>';
                html += `<td><strong>${sheet}</strong></td>`;
                
                branches.forEach(branch => {
                    const key = `${sheet}_${branch}`;
                    const data = localStorage.getItem(key);
                    const exists = data !== null;
                    html += `<td class="${exists ? 'success' : 'error'}">${exists ? '✅ Есть' : '❌ Нет'}</td>`;
                });
                
                html += '<td>-</td>';
                html += '</tr>';
            });
            
            html += '</table>';
            result.innerHTML = html;
        }
        
        function testConsolidation() {
            const result = document.getElementById('result');
            const branches = ['almaty', 'uralsk', 'astana'];
            
            let html = '<h2>Тест консолидации rb_svod</h2>';
            
            // Загружаем данные
            const allData = {};
            branches.forEach(b => {
                const key = `rb_svod_${b}`;
                const saved = localStorage.getItem(key);
                if (saved) {
                    const data = JSON.parse(saved);
                    allData[b] = data.cells || {};
                }
            });
            
            // Берём первые 10 ячеек из Алматы и проверяем консолидацию
            const almatyKeys = Object.keys(allData['almaty'] || {}).slice(0, 10);
            
            html += '<table><tr><th>Ячейка</th><th>Алматы</th><th>Уральск</th><th>Астана</th><th>Консолидация</th><th>Проверка</th></tr>';
            
            almatyKeys.forEach(cellId => {
                const almaty = parseFloat(allData['almaty']?.[cellId]) || 0;
                const uralsk = parseFloat(allData['uralsk']?.[cellId]) || 0;
                const astana = parseFloat(allData['astana']?.[cellId]) || 0;
                const sum = almaty + uralsk + astana;
                
                const isCorrect = sum > 0;
                
                html += '<tr>';
                html += `<td><strong>${cellId}</strong></td>`;
                html += `<td>${almaty.toFixed(2)}</td>`;
                html += `<td>${uralsk.toFixed(2)}</td>`;
                html += `<td>${astana.toFixed(2)}</td>`;
                html += `<td><strong>${sum.toFixed(2)}</strong></td>`;
                html += `<td class="${isCorrect ? 'success' : 'warning'}">${isCorrect ? '✅' : '⚠️'}</td>`;
                html += '</tr>';
            });
            
            html += '</table>';
            
            html += '<h3>Подробные данные:</h3>';
            html += '<pre>' + JSON.stringify(allData, null, 2).substring(0, 2000) + '...</pre>';
            
            result.innerHTML = html;
        }
        
        function showAllKeys() {
            const result = document.getElementById('result');
            const keys = [];
            
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && (key.startsWith('rb_') || key.startsWith('pu_') || key.startsWith('fot_'))) {
                    const data = localStorage.getItem(key);
                    keys.push({
                        key: key,
                        size: (data.length / 1024).toFixed(2) + ' KB'
                    });
                }
            }
            
            let html = '<h2>Все ключи в localStorage</h2>';
            html += '<table><tr><th>Ключ</th><th>Размер</th></tr>';
            
            keys.forEach(item => {
                html += `<tr><td>${item.key}</td><td>${item.size}</td></tr>`;
            });
            
            html += '</table>';
            html += `<p><strong>Всего ключей:</strong> ${keys.length}</p>`;
            
            result.innerHTML = html;
        }
    </script>
</body>
</html>
