<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Исправление localStorage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        h1 {
            color: #e74c3c;
            margin-bottom: 20px;
        }
        button {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 5px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.4);
        }
        button.safe {
            background: linear-gradient(135deg, #3498db, #2980b9);
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }
        button.safe:hover {
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            max-height: 400px;
            overflow-y: auto;
        }
        .error {
            color: #e74c3c;
            font-weight: bold;
        }
        .success {
            color: #27ae60;
            font-weight: bold;
        }
        .warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin: 15px 0;
        }
        pre {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 12px;
        }
    
        /* Mobile adaptation - Tablets */
        @media (max-width: 1200px) {
            .container {
                max-width: 100%;
            }
            
            .table-container {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
        }

        /* Mobile adaptation - Medium screens */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header, .container {
                padding: 15px 20px;
                margin-bottom: 15px;
            }

            h1 {
                font-size: 20px;
                margin-bottom: 8px;
            }

            h2 {
                font-size: 16px;
            }

            .subtitle {
                font-size: 12px;
            }

            .branch-selector, .btn-group, .controls {
                gap: 8px;
                margin-top: 10px;
            }

            .btn, button, .branch-btn {
                padding: 10px 16px;
                font-size: 12px;
            }

            .info-bar, .status-bar {
                padding: 12px 15px;
                gap: 10px;
            }
            
            table {
                font-size: 11px;
            }

            th, td {
                padding: 6px 4px;
            }

            .section-footer {
                padding: 12px;
                gap: 8px;
            }

            input, select, textarea {
                padding: 6px;
                font-size: 12px;
            }
        }

        /* Mobile adaptation - Small screens */
        @media (max-width: 480px) {
            body {
                padding: 5px;
            }

            .header, .container {
                padding: 12px 15px;
                border-radius: 10px;
            }

            h1 {
                font-size: 18px;
            }

            h2 {
                font-size: 14px;
            }

            .subtitle {
                font-size: 11px;
                margin-bottom: 10px;
            }

            .branch-selector, .btn-group, .controls {
                flex-direction: column;
                gap: 6px;
            }

            .btn, button, .branch-btn {
                width: 100%;
                padding: 10px;
                font-size: 13px;
            }

            .info-bar, .status-bar {
                flex-direction: column;
                padding: 10px;
                gap: 8px;
            }

            table {
                font-size: 10px;
            }

            th, td {
                padding: 4px 2px;
            }

            .section-footer {
                flex-direction: column;
                padding: 10px;
            }

            input, select, textarea {
                font-size: 11px;
                padding: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Исправление localStorage для РБ</h1>
        
        <div class="warning">
            ⚠️ <strong>ВНИМАНИЕ:</strong> Эта страница поможет исправить проблемы с данными в localStorage
        </div>

        <div style="margin: 20px 0;">
            <button class="safe" onclick="checkStorage()">🔍 Проверить localStorage</button>
            <button onclick="fixStorage()">🔧 Исправить структуру данных</button>
            <button onclick="clearRBStorage()">🗑️ Очистить все РБ данные</button>
            <button onclick="clearAllStorage()" style="background: linear-gradient(135deg, #95a5a6, #7f8c8d);">💣 Очистить ВСЁ (РБ+ПУ)</button>
        </div>

        <div class="result" id="result"></div>
    </div>

    <script>
        function checkStorage() {
            const result = document.getElementById('result');
            let html = '<h3>Проверка localStorage:</h3>';
            
            const rbKeys = [];
            const puKeys = [];
            const otherKeys = [];
            
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('rb_')) rbKeys.push(key);
                else if (key.startsWith('pu_')) puKeys.push(key);
                else otherKeys.push(key);
            }
            
            html += `<p><strong>Всего записей:</strong> ${localStorage.length}</p>`;
            html += `<p><strong>РБ записей:</strong> ${rbKeys.length}</p>`;
            html += `<p><strong>ПУ записей:</strong> ${puKeys.length}</p>`;
            
            if (rbKeys.length > 0) {
                html += '<h4>РБ данные:</h4>';
                rbKeys.forEach(key => {
                    const data = localStorage.getItem(key);
                    try {
                        const parsed = JSON.parse(data);
                        const hasCells = parsed.cells !== undefined;
                        const cellsType = typeof parsed.cells;
                        const cellsKeys = parsed.cells ? Object.keys(parsed.cells).length : 0;
                        
                        html += `<div style="margin: 10px 0; padding: 10px; background: ${hasCells ? '#d4edda' : '#f8d7da'}; border-radius: 5px;">`;
                        html += `<strong>${key}</strong><br>`;
                        html += `cells: ${hasCells ? '<span class="success">✓ есть</span>' : '<span class="error">✗ нет</span>'}`;
                        if (hasCells) {
                            html += ` (${cellsType}, ${cellsKeys} записей)`;
                        }
                        html += `<br>branch: ${parsed.branch || 'N/A'}`;
                        html += `<br>sheet: ${parsed.sheet || 'N/A'}`;
                        html += `</div>`;
                    } catch(e) {
                        html += `<div style="margin: 10px 0; padding: 10px; background: #f8d7da; border-radius: 5px;">`;
                        html += `<strong>${key}</strong>: <span class="error">Ошибка парсинга JSON</span>`;
                        html += `</div>`;
                    }
                });
            }
            
            result.innerHTML = html;
        }

        function fixStorage() {
            const result = document.getElementById('result');
            let html = '<h3>Исправление данных:</h3>';
            let fixed = 0;
            
            const rbKeys = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('rb_')) rbKeys.push(key);
            }
            
            rbKeys.forEach(key => {
                try {
                    const data = JSON.parse(localStorage.getItem(key));
                    
                    // Если нет cells, создаем
                    if (!data.cells) {
                        data.cells = {};
                        html += `<p class="success">✓ Добавлено поле cells в ${key}</p>`;
                        fixed++;
                    }
                    
                    // Убеждаемся что есть все необходимые поля
                    if (!data.branch) {
                        const parts = key.split('_');
                        data.branch = parts[parts.length - 1]; // последняя часть ключа
                        html += `<p class="success">✓ Добавлено поле branch в ${key}</p>`;
                        fixed++;
                    }
                    
                    if (!data.sheet) {
                        const parts = key.split('_');
                        data.sheet = parts.slice(0, -1).join('_'); // все кроме последней части
                        html += `<p class="success">✓ Добавлено поле sheet в ${key}</p>`;
                        fixed++;
                    }
                    
                    if (!data.lastModified) {
                        data.lastModified = new Date().toISOString();
                        html += `<p class="success">✓ Добавлено поле lastModified в ${key}</p>`;
                        fixed++;
                    }
                    
                    // Сохраняем исправленные данные
                    localStorage.setItem(key, JSON.stringify(data));
                    
                } catch(e) {
                    html += `<p class="error">✗ Ошибка исправления ${key}: ${e.message}</p>`;
                }
            });
            
            if (fixed === 0) {
                html += '<p class="success">✓ Все данные в порядке, исправлений не требуется</p>';
            } else {
                html += `<p style="margin-top: 20px; font-weight: bold; color: #27ae60;">Исправлено: ${fixed} записей</p>`;
            }
            
            result.innerHTML = html;
        }

        function clearRBStorage() {
            if (!confirm('Вы уверены? Это удалит ВСЕ данные РБ (но не ПУ)')) return;
            
            const rbKeys = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('rb_')) rbKeys.push(key);
            }
            
            rbKeys.forEach(key => localStorage.removeItem(key));
            
            const result = document.getElementById('result');
            result.innerHTML = `<h3 class="success">✓ Удалено ${rbKeys.length} записей РБ</h3>`;
        }

        function clearAllStorage() {
            if (!confirm('ВЫ УВЕРЕНЫ? Это удалит ВСЕ данные (РБ + ПУ)!')) return;
            if (!confirm('ПОСЛЕДНЕЕ ПРЕДУПРЕЖДЕНИЕ! Все данные будут потеряны!')) return;
            
            const count = localStorage.length;
            localStorage.clear();
            
            const result = document.getElementById('result');
            result.innerHTML = `<h3 class="success">✓ Удалено ${count} записей (localStorage полностью очищен)</h3>`;
        }
    </script>
</body>
</html>
