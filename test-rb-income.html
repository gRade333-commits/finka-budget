<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест rb-income консолидации</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px; font-size: 14px; }
        button:hover { background: #2980b9; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #3498db; color: white; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        .warning { background: #fff3cd; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; font-size: 11px; max-height: 400px; }
    
        /* Mobile adaptation - Tablets */
        @media (max-width: 1200px) {
            .container {
                max-width: 100%;
            }
            
            .table-container {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
        }

        /* Mobile adaptation - Medium screens */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header, .container {
                padding: 15px 20px;
                margin-bottom: 15px;
            }

            h1 {
                font-size: 20px;
                margin-bottom: 8px;
            }

            h2 {
                font-size: 16px;
            }

            .subtitle {
                font-size: 12px;
            }

            .branch-selector, .btn-group, .controls {
                gap: 8px;
                margin-top: 10px;
            }

            .btn, button, .branch-btn {
                padding: 10px 16px;
                font-size: 12px;
            }

            .info-bar, .status-bar {
                padding: 12px 15px;
                gap: 10px;
            }
            
            table {
                font-size: 11px;
            }

            th, td {
                padding: 6px 4px;
            }

            .section-footer {
                padding: 12px;
                gap: 8px;
            }

            input, select, textarea {
                padding: 6px;
                font-size: 12px;
            }
        }

        /* Mobile adaptation - Small screens */
        @media (max-width: 480px) {
            body {
                padding: 5px;
            }

            .header, .container {
                padding: 12px 15px;
                border-radius: 10px;
            }

            h1 {
                font-size: 18px;
            }

            h2 {
                font-size: 14px;
            }

            .subtitle {
                font-size: 11px;
                margin-bottom: 10px;
            }

            .branch-selector, .btn-group, .controls {
                flex-direction: column;
                gap: 6px;
            }

            .btn, button, .branch-btn {
                width: 100%;
                padding: 10px;
                font-size: 13px;
            }

            .info-bar, .status-bar {
                flex-direction: column;
                padding: 10px;
                gap: 8px;
            }

            table {
                font-size: 10px;
            }

            th, td {
                padding: 4px 2px;
            }

            .section-footer {
                flex-direction: column;
                padding: 10px;
            }

            input, select, textarea {
                font-size: 11px;
                padding: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Диагностика rb-income консолидации</h1>
        
        <button onclick="testConsolidation()">Проверить консолидацию</button>
        <button onclick="showRawData()">Показать сырые данные</button>
        <button onclick="testSaveProtection()">Проверить защиту от сохранения</button>
        
        <div id="result"></div>
    </div>

    <script>
        let currentBranch = 'almaty'; // Имитация

        function testConsolidation() {
            const result = document.getElementById('result');
            const branches = ['almaty', 'uralsk', 'astana'];
            
            let html = '<h2>Тест консолидации rb_income</h2>';
            
            // Проверяем наличие данных
            html += '<h3>1. Проверка наличия данных:</h3>';
            html += '<table><tr><th>Филиал</th><th>Ключ</th><th>Есть данные?</th><th>Количество ячеек</th><th>Пример ячейки E7</th></tr>';
            
            const allData = {};
            branches.forEach(b => {
                const key = `rb_income_${b}`;
                const saved = localStorage.getItem(key);
                const exists = saved !== null;
                
                let cellCount = 0;
                let e7Value = 'нет';
                
                if (exists) {
                    try {
                        const data = JSON.parse(saved);
                        allData[b] = data.cells || {};
                        cellCount = Object.keys(data.cells || {}).length;
                        e7Value = data.cells?.E7 || 'нет';
                    } catch (e) {
                        e7Value = 'ошибка парсинга';
                    }
                }
                
                html += `<tr class="${exists ? 'success' : 'error'}">`;
                html += `<td><strong>${b}</strong></td>`;
                html += `<td>${key}</td>`;
                html += `<td>${exists ? '✅ Да' : '❌ Нет'}</td>`;
                html += `<td>${cellCount}</td>`;
                html += `<td>${e7Value}</td>`;
                html += '</tr>';
            });
            html += '</table>';
            
            // Тестируем консолидацию
            html += '<h3>2. Тест консолидации (первые 20 ячеек с данными):</h3>';
            html += '<table><tr><th>Ячейка</th><th>Алматы</th><th>Уральск</th><th>Астана</th><th>Сумма</th><th>Проверка</th></tr>';
            
            // Находим все уникальные ячейки
            const allCells = new Set();
            branches.forEach(b => {
                if (allData[b]) {
                    Object.keys(allData[b]).forEach(cell => allCells.add(cell));
                }
            });
            
            const cellsArray = Array.from(allCells).slice(0, 20);
            
            if (cellsArray.length === 0) {
                html += '<tr><td colspan="6" class="error">❌ НЕТ ДАННЫХ! Сначала заполните данные через reset-and-refill.html</td></tr>';
            } else {
                cellsArray.forEach(cellId => {
                    const almaty = parseFloat(allData['almaty']?.[cellId]) || 0;
                    const uralsk = parseFloat(allData['uralsk']?.[cellId]) || 0;
                    const astana = parseFloat(allData['astana']?.[cellId]) || 0;
                    const sum = almaty + uralsk + astana;
                    
                    const hasDifferentValues = (almaty !== uralsk || uralsk !== astana);
                    const isCorrect = sum > 0 && hasDifferentValues;
                    
                    html += '<tr>';
                    html += `<td><strong>${cellId}</strong></td>`;
                    html += `<td>${almaty.toFixed(2)}</td>`;
                    html += `<td>${uralsk.toFixed(2)}</td>`;
                    html += `<td>${astana.toFixed(2)}</td>`;
                    html += `<td><strong>${sum.toFixed(2)}</strong></td>`;
                    html += `<td class="${isCorrect ? 'success' : 'warning'}">${isCorrect ? '✅' : (sum > 0 ? '⚠️ одинаковые' : '❌')}</td>`;
                    html += '</tr>';
                });
            }
            
            html += '</table>';
            
            // Диагностика проблем
            html += '<h3>3. Диагностика:</h3>';
            html += '<ul>';
            
            const almatyData = localStorage.getItem('rb_income_almaty');
            const uralskData = localStorage.getItem('rb_income_uralsk');
            const astanaData = localStorage.getItem('rb_income_astana');
            
            if (!almatyData || !uralskData || !astanaData) {
                html += '<li class="error">❌ <strong>ПРОБЛЕМА:</strong> Не все филиалы имеют данные! Откройте reset-and-refill.html и нажмите "ПОЛНЫЙ СБРОС + ЗАПОЛНЕНИЕ"</li>';
            } else {
                html += '<li class="success">✅ Все 3 филиала имеют данные в localStorage</li>';
                
                // Проверяем одинаковые ли данные
                if (almatyData === uralskData) {
                    html += '<li class="error">❌ <strong>ПРОБЛЕМА:</strong> Данные Алматы и Уральска ИДЕНТИЧНЫ! Это значит данные повреждены. Нужен полный сброс!</li>';
                } else if (uralskData === astanaData) {
                    html += '<li class="error">❌ <strong>ПРОБЛЕМА:</strong> Данные Уральска и Астаны ИДЕНТИЧНЫ! Нужен полный сброс!</li>';
                } else if (almatyData === astanaData) {
                    html += '<li class="error">❌ <strong>ПРОБЛЕМА:</strong> Данные Алматы и Астаны ИДЕНТИЧНЫ! Нужен полный сброс!</li>';
                } else {
                    html += '<li class="success">✅ Данные у всех филиалов РАЗНЫЕ (это правильно)</li>';
                }
            }
            
            html += '</ul>';
            
            result.innerHTML = html;
        }

        function showRawData() {
            const result = document.getElementById('result');
            const branches = ['almaty', 'uralsk', 'astana'];
            
            let html = '<h2>Сырые данные из localStorage</h2>';
            
            branches.forEach(b => {
                const key = `rb_income_${b}`;
                const saved = localStorage.getItem(key);
                
                html += `<h3>${b} (${key}):</h3>`;
                
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        const preview = JSON.stringify(data, null, 2);
                        html += `<pre>${preview.substring(0, 2000)}${preview.length > 2000 ? '\n... (обрезано)' : ''}</pre>`;
                    } catch (e) {
                        html += `<pre class="error">Ошибка парсинга: ${e.message}</pre>`;
                    }
                } else {
                    html += '<pre class="error">Нет данных</pre>';
                }
            });
            
            result.innerHTML = html;
        }

        function testSaveProtection() {
            const result = document.getElementById('result');
            
            let html = '<h2>Тест защиты от сохранения в режиме консолидации</h2>';
            
            // Имитация функции saveData с проверкой
            function mockSaveDataWithProtection() {
                if (currentBranch === 'consolidated') {
                    return 'БЛОКИРОВАНО (правильно!)';
                }
                return 'СОХРАНЕНО';
            }
            
            // Имитация без проверки
            function mockSaveDataWithoutProtection() {
                return 'СОХРАНЕНО (ОШИБКА!)';
            }
            
            html += '<table>';
            html += '<tr><th>Режим</th><th>С защитой</th><th>Без защиты</th></tr>';
            
            currentBranch = 'almaty';
            html += `<tr><td>almaty</td><td class="success">${mockSaveDataWithProtection()}</td><td class="success">${mockSaveDataWithoutProtection()}</td></tr>`;
            
            currentBranch = 'consolidated';
            html += `<tr><td>consolidated</td><td class="success">${mockSaveDataWithProtection()}</td><td class="error">${mockSaveDataWithoutProtection()}</td></tr>`;
            
            html += '</table>';
            
            html += '<p><strong>Вывод:</strong> В исправленных файлах должна быть защита от сохранения в режиме консолидации.</p>';
            
            html += '<h3>Проверка кода rb-income.html:</h3>';
            html += '<p>Откройте rb-income.html в текстовом редакторе и найдите функцию saveData(). Первая строка должна быть:</p>';
            html += '<pre>function saveData() {\n    // Не сохраняем в режиме консолидации\n    if (currentBranch === \'consolidated\') return;\n    ...</pre>';
            
            result.innerHTML = html;
        }
    </script>
</body>
</html>
