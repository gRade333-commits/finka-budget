<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="shared.css">
    <title>Заполнение тестовыми данными</title>
</head>
<body class="page-util">
    <div class="container">
        <h1>🎲 Заполнение тестовыми данными</h1>
        
        <div class="info">
            <h3>ℹ️ Информация</h3>
            <p>Эта утилита автоматически заполнит все таблицы бюджетной системы тестовыми данными для 3 филиалов.</p>
            <p><strong>Данные будут случайными числами в разумных диапазонах.</strong></p>
        </div>

        <h3>Выберите действие:</h3>
        <button onclick="fillAllData()">🎲 Заполнить ВСЕ таблицы</button>
        <button onclick="fillRBData()">📊 Заполнить только РБ (6 листов)</button>
        <button onclick="fillPUData()">📈 Заполнить только ПУ (11 листов)</button>
        <br><br>
        <button class="clear" onclick="clearAllData()">🗑️ Очистить все данные</button>

        <div class="progress" id="progress"></div>
        <div class="result" id="result"></div>
    </div>

    <script>
        function random(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function fillAllData() {
            fillRBData();
            setTimeout(() => fillPUData(), 500);
        }

        function fillRBData() {
            const progress = document.getElementById('progress');
            progress.style.display = 'block';
            progress.innerHTML = '<h4>Заполнение РБ данных...</h4>';
            
            const branches = ['almaty', 'uralsk', 'astana', 'nao'];
            const sheets = [
                'rb_svod',
                'rb_income', 
                'rb_fzp',
                'rb_kalkulyacia',
                'rb_svodnaya',
                'rb_plan_komandir'
            ];
            
            let count = 0;
            
            sheets.forEach(sheet => {
                branches.forEach(branch => {
                    const data = {
                        branch: branch,
                        sheet: sheet,
                        lastModified: new Date().toISOString(),
                        cells: {}
                    };
                    
                    // Заполняем ВСЕ возможные варианты ячеек
                    
                    // 1. Стандартные ячейки A-Z + цифры (до 200 строк)
                    const cols = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
                    for (let row = 1; row <= 200; row++) {
                        for (let col of cols) {
                            data.cells[col + row] = random(100, 50000).toString();
                        }
                    }
                    
                    // 2. Двухбуквенные колонки (AA-AZ, BA-BZ и т.д.)
                    for (let firstLetter of ['A', 'B', 'C', 'D', 'E']) {
                        for (let secondLetter of cols.slice(0, 10)) {
                            for (let row = 1; row <= 50; row++) {
                                data.cells[firstLetter + secondLetter + row] = random(100, 50000).toString();
                            }
                        }
                    }
                    
                    // 3. Ячейки с годами (2026, 2027, 2028)
                    for (let year of ['2026', '2027', '2028']) {
                        for (let i = 1; i <= 100; i++) {
                            data.cells[year + '-' + i] = random(5000, 100000).toString();
                            data.cells[year + '_' + i] = random(5000, 100000).toString();
                            data.cells['year' + year + '-' + i] = random(5000, 100000).toString();
                        }
                    }
                    
                    // 4. Ячейки с месяцами (jan, feb, etc или m1-m12)
                    const months = ['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec'];
                    for (let row = 1; row <= 50; row++) {
                        for (let month of months) {
                            data.cells[month + row] = random(1000, 30000).toString();
                        }
                        for (let m = 1; m <= 12; m++) {
                            data.cells['m' + m + '-' + row] = random(1000, 30000).toString();
                            data.cells['month' + m + '-' + row] = random(1000, 30000).toString();
                        }
                    }
                    
                    // 5. Специальные форматы для разных типов полей
                    for (let i = 1; i <= 100; i++) {
                        // Ячейки типа cell-1, cell-2
                        data.cells['cell-' + i] = random(100, 50000).toString();
                        data.cells['cell_' + i] = random(100, 50000).toString();
                        
                        // Ячейки типа row-1, row-2
                        data.cells['row-' + i] = random(100, 50000).toString();
                        data.cells['row_' + i] = random(100, 50000).toString();
                        
                        // Ячейки типа input-1, input-2
                        data.cells['input-' + i] = random(100, 50000).toString();
                        data.cells['input_' + i] = random(100, 50000).toString();
                        
                        // Ячейки типа field-1, field-2
                        data.cells['field-' + i] = random(100, 50000).toString();
                        data.cells['field_' + i] = random(100, 50000).toString();
                        
                        // Числовые ID
                        data.cells[i.toString()] = random(100, 50000).toString();
                    }
                    
                    // 6. Комбинированные форматы (r1-c1, r1-c2 и т.д.)
                    for (let r = 1; r <= 50; r++) {
                        for (let c = 1; c <= 20; c++) {
                            data.cells['r' + r + '-c' + c] = random(100, 50000).toString();
                            data.cells['r' + r + '_c' + c] = random(100, 50000).toString();
                            data.cells['row' + r + '-col' + c] = random(100, 50000).toString();
                        }
                    }
                    
                    localStorage.setItem(`${sheet}_${branch}`, JSON.stringify(data));
                    count++;
                });
            });
            
            // Отдельно для fot_almaty (может иметь другую структуру)
            branches.forEach(branch => {
                const data = {
                    branch: branch,
                    lastModified: new Date().toISOString(),
                    cells: {}
                };
                
                // Все те же паттерны
                const cols = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
                for (let row = 1; row <= 200; row++) {
                    for (let col of cols) {
                        data.cells[col + row] = random(100, 50000).toString();
                    }
                }
                
                for (let i = 1; i <= 100; i++) {
                    data.cells['cell-' + i] = random(100, 50000).toString();
                    data.cells[i.toString()] = random(100, 50000).toString();
                }
                
                localStorage.setItem(`fot_${branch}`, JSON.stringify(data));
                count++;
            });
            
            progress.innerHTML += `<p>✅ Заполнено ${count} записей для РБ (включая тысячи ячеек в каждой)</p>`;
            showResult();
        }

        function fillPUData() {
            const progress = document.getElementById('progress');
            progress.style.display = 'block';
            progress.innerHTML += '<h4>Заполнение ПУ данных...</h4>';
            
            const branches = ['almaty', 'uralsk', 'astana', 'nao'];
            let count = 0;
            
            // pu-svod-2026
            branches.forEach(branch => {
                const rows = [];
                for (let i = 1; i <= 10; i++) {
                    rows.push({
                        name: `Статья расходов ${i}`,
                        plan: random(50000, 200000),
                        fact: random(40000, 180000),
                        note: 'Тест'
                    });
                }
                localStorage.setItem(`pu_svod_2026_${branch}`, JSON.stringify({ rows }));
                count++;
            });
            
            // pu-ss-dotacia
            branches.forEach(branch => {
                const data = {
                    contingent: {
                        school: random(150, 200).toString(),
                        fc: random(150, 200).toString()
                    },
                    items: {}
                };
                for (let i = 1; i <= 19; i++) {
                    data.items[i] = {
                        total: random(1000, 10000).toString(),
                        fc: random(500, 5000).toString()
                    };
                }
                localStorage.setItem(`pu_ss_dotacia_${branch}`, JSON.stringify(data));
                count++;
            });
            
            // pu-income-pu
            branches.forEach(branch => {
                const data = { rows: {} };
                for (let r = 1; r <= 7; r++) {
                    data.rows[r] = { cont: random(100, 300).toString() };
                    for (let m = 1; m <= 12; m++) {
                        data.rows[r][`m${m}`] = random(5000, 20000).toString();
                    }
                }
                localStorage.setItem(`pu_income_pu_${branch}`, JSON.stringify(data));
                count++;
            });
            
            // pu-income-dt
            branches.forEach(branch => {
                const data = { rows: {} };
                for (let r = 1; r <= 7; r++) {
                    data.rows[r] = { cont: random(100, 300).toString() };
                    for (let m = 1; m <= 12; m++) {
                        data.rows[r][`m${m}`] = random(3000, 15000).toString();
                    }
                }
                localStorage.setItem(`pu_income_dt_${branch}`, JSON.stringify(data));
                count++;
            });
            
            // pu-income-dop
            branches.forEach(branch => {
                const data = { rows: {} };
                for (let r = 1; r <= 6; r++) {
                    data.rows[r] = {};
                    for (let m = 1; m <= 12; m++) {
                        data.rows[r][`m${m}`] = random(2000, 10000).toString();
                    }
                }
                localStorage.setItem(`pu_income_dop_${branch}`, JSON.stringify(data));
                count++;
            });
            
            // pu-fot-almaty, pu-kalkulyacia-almaty
            ['pu_fot', 'pu_kalkulyacia'].forEach(key => {
                branches.forEach(branch => {
                    const data = {};
                    for (let i = 1; i <= 10; i++) {
                        data['i' + i] = random(5000, 50000).toString();
                    }
                    localStorage.setItem(`${key}_${branch}`, JSON.stringify(data));
                    count++;
                });
            });
            
            // pu-grafik-almaty
            branches.forEach(branch => {
                const rows = [];
                for (let i = 1; i <= 5; i++) {
                    rows.push({
                        class: `${i} класс`,
                        count: random(20, 40),
                        tariff: random(3000, 8000)
                    });
                }
                localStorage.setItem(`pu_grafik_${branch}`, JSON.stringify({ rows }));
                count++;
            });
            
            // pu-plan-rk
            branches.forEach(branch => {
                const rows = [];
                for (let i = 1; i <= 8; i++) {
                    rows.push({
                        purpose: `Командировка ${i}`,
                        city: `Город ${i}`,
                        trips: random(1, 5),
                        days: random(2, 7),
                        people: random(1, 3),
                        ticket: random(10000, 50000),
                        hotel: random(5000, 20000)
                    });
                }
                localStorage.setItem(`pu_plan_rk_${branch}`, JSON.stringify({ rows }));
                count++;
            });
            
            // pu-plan-abroad
            branches.forEach(branch => {
                const rows = [];
                for (let i = 1; i <= 5; i++) {
                    rows.push({
                        purpose: `Поездка ${i}`,
                        country: `Страна ${i}`,
                        trips: random(1, 3),
                        days: random(3, 10),
                        people: random(1, 2),
                        ticket: random(50000, 200000),
                        visa: random(10000, 50000)
                    });
                }
                localStorage.setItem(`pu_plan_abroad_${branch}`, JSON.stringify({ rows }));
                count++;
            });
            
            progress.innerHTML += `<p>✅ Заполнено ${count} записей для ПУ</p>`;
            showResult();
        }

        function showResult() {
            const result = document.getElementById('result');
            result.style.display = 'block';
            
            const totalKeys = Object.keys(localStorage).filter(k => 
                k.startsWith('rb_') || k.startsWith('pu_') || k.startsWith('fot_')
            ).length;
            
            result.innerHTML = `
                <h3>✅ Данные успешно заполнены!</h3>
                <p><strong>Всего записей в localStorage:</strong> ${totalKeys}</p>
                <p>Теперь можете открыть любой лист бюджета и проверить:</p>
                <ul>
                    <li>✅ Переключение между филиалами (Алматы, Уральск, Астана)</li>
                    <li>✅ Консолидацию данных (должна суммировать все 3 филиала)</li>
                    <li>✅ Экспорт в Excel</li>
                    <li>✅ Автосохранение</li>
                </ul>
                <p style="color: #27ae60; font-weight: bold;">🎉 Все готово для тестирования!</p>
            `;
        }

        function clearAllData() {
            if (!confirm('Вы уверены? Это удалит ВСЕ данные бюджета из localStorage!')) {
                return;
            }
            
            const keysToRemove = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && (key.startsWith('rb_') || key.startsWith('pu_') || key.startsWith('fot_'))) {
                    keysToRemove.push(key);
                }
            }
            
            keysToRemove.forEach(key => localStorage.removeItem(key));
            
            const result = document.getElementById('result');
            result.style.display = 'block';
            result.innerHTML = `
                <h3>🗑️ Данные удалены</h3>
                <p>Удалено ${keysToRemove.length} записей</p>
            `;
            
            document.getElementById('progress').style.display = 'none';
        }
    </script>
    <script src="shared-nav.js"></script>
</body>
</html>
