<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка импортированных данных</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {text-align: center; color: #2c3e50; margin-bottom: 10px;}
        .subtitle {text-align: center; color: #7f8c8d; margin-bottom: 40px;}
        .btn {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            margin: 10px;
        }
        .btn:hover {background: #764ba2;}
        .log {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            max-height: 600px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }
        .log-entry {padding: 5px 0; border-bottom: 1px solid #e9ecef;}
        .log-success {color: #28a745;}
        .log-error {color: #dc3545;}
        .log-info {color: #17a2b8;}
        .log-warning {color: #ffc107;}
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
    
        /* Mobile adaptation - Tablets */
        @media (max-width: 1200px) {
            .container {
                max-width: 100%;
            }
            
            .table-container {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
        }

        /* Mobile adaptation - Medium screens */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header, .container {
                padding: 15px 20px;
                margin-bottom: 15px;
            }

            h1 {
                font-size: 20px;
                margin-bottom: 8px;
            }

            h2 {
                font-size: 16px;
            }

            .subtitle {
                font-size: 12px;
            }

            .branch-selector, .btn-group, .controls {
                gap: 8px;
                margin-top: 10px;
            }

            .btn, button, .branch-btn {
                padding: 10px 16px;
                font-size: 12px;
            }

            .info-bar, .status-bar {
                padding: 12px 15px;
                gap: 10px;
            }
            
            table {
                font-size: 11px;
            }

            th, td {
                padding: 6px 4px;
            }

            .section-footer {
                padding: 12px;
                gap: 8px;
            }

            input, select, textarea {
                padding: 6px;
                font-size: 12px;
            }
        }

        /* Mobile adaptation - Small screens */
        @media (max-width: 480px) {
            body {
                padding: 5px;
            }

            .header, .container {
                padding: 12px 15px;
                border-radius: 10px;
            }

            h1 {
                font-size: 18px;
            }

            h2 {
                font-size: 14px;
            }

            .subtitle {
                font-size: 11px;
                margin-bottom: 10px;
            }

            .branch-selector, .btn-group, .controls {
                flex-direction: column;
                gap: 6px;
            }

            .btn, button, .branch-btn {
                width: 100%;
                padding: 10px;
                font-size: 13px;
            }

            .info-bar, .status-bar {
                flex-direction: column;
                padding: 10px;
                gap: 8px;
            }

            table {
                font-size: 10px;
            }

            th, td {
                padding: 4px 2px;
            }

            .section-footer {
                flex-direction: column;
                padding: 10px;
            }

            input, select, textarea {
                font-size: 11px;
                padding: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Вернуться на главную</a>
        
        <h1>🔍 Проверка импортированных данных</h1>
        <p class="subtitle">Диагностика данных в localStorage</p>

        <div style="text-align: center;">
            <button class="btn" onclick="checkData()">🔍 Проверить данные</button>
            <button class="btn" onclick="showSample()">📋 Показать примеры</button>
        </div>

        <div class="log" id="log">
            <div class="log-entry log-info">Нажмите "Проверить данные" для начала диагностики...</div>
        </div>
    </div>

    <script>
        function addLog(message, type = 'info') {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function checkData() {
            document.getElementById('log').innerHTML = '';
            addLog('🚀 Начало проверки данных...', 'info');

            const branches = ['almaty', 'uralsk', 'astana'];
            const rbTables = ['rb_svod', 'rb_svodnaya', 'rb_income', 'rb_fzp', 'rb_kalkulyacia', 'rb_plan_komandir'];
            const puTables = ['pu_svod_2026', 'pu_ss_dotacia', 'pu_income_pu', 'pu_income_dt', 'pu_income_dop', 
                             'pu_fot_almaty', 'pu_grafik_almaty', 'pu_kalkulyacia_almaty', 'pu_plan_rk', 
                             'pu_plan_abroad', 'pu_ss_almaty'];

            addLog('', 'info');
            addLog('=== РБ (Республиканский бюджет) ===', 'info');
            
            let rbFound = 0;
            let rbMissing = 0;
            
            rbTables.forEach(table => {
                const branchResults = [];
                branches.forEach(branch => {
                    const key = `${table}_${branch}`;
                    const data = localStorage.getItem(key);
                    if (data) {
                        try {
                            const parsed = JSON.parse(data);
                            if (table === 'rb_svodnaya') {
                                const keys = Object.keys(parsed);
                                branchResults.push(`${branch}: ${keys.length} ячеек`);
                                rbFound++;
                            } else if (parsed.cells) {
                                const keys = Object.keys(parsed.cells);
                                branchResults.push(`${branch}: ${keys.length} ячеек`);
                                rbFound++;
                            } else {
                                branchResults.push(`${branch}: неверный формат`);
                                rbMissing++;
                            }
                        } catch (e) {
                            branchResults.push(`${branch}: ошибка`);
                            rbMissing++;
                        }
                    } else {
                        branchResults.push(`${branch}: нет данных`);
                        rbMissing++;
                    }
                });
                
                if (branchResults.every(r => r.includes('нет данных'))) {
                    addLog(`❌ ${table}: нет данных`, 'error');
                } else {
                    addLog(`✅ ${table}: ${branchResults.join(', ')}`, 'success');
                }
            });

            addLog('', 'info');
            addLog('=== ПУ (Подушевое финансирование) ===', 'info');
            
            let puFound = 0;
            let puMissing = 0;
            
            puTables.forEach(table => {
                const branchResults = [];
                branches.forEach(branch => {
                    const key = `${table}_${branch}`;
                    const data = localStorage.getItem(key);
                    if (data) {
                        try {
                            const parsed = JSON.parse(data);
                            if (parsed.cells) {
                                const keys = Object.keys(parsed.cells);
                                branchResults.push(`${branch}: ${keys.length} ячеек`);
                                puFound++;
                            } else {
                                branchResults.push(`${branch}: неверный формат`);
                                puMissing++;
                            }
                        } catch (e) {
                            branchResults.push(`${branch}: ошибка`);
                            puMissing++;
                        }
                    } else {
                        branchResults.push(`${branch}: нет данных`);
                        puMissing++;
                    }
                });
                
                if (branchResults.every(r => r.includes('нет данных'))) {
                    addLog(`❌ ${table}: нет данных`, 'error');
                } else {
                    addLog(`✅ ${table}: ${branchResults.join(', ')}`, 'success');
                }
            });

            addLog('', 'info');
            addLog(`📊 ИТОГО:`, 'info');
            addLog(`✅ РБ: найдено ${rbFound}, отсутствует ${rbMissing}`, rbFound > 0 ? 'success' : 'error');
            addLog(`✅ ПУ: найдено ${puFound}, отсутствует ${puMissing}`, puFound > 0 ? 'success' : 'error');
        }

        function showSample() {
            document.getElementById('log').innerHTML = '';
            addLog('📋 Примеры данных из localStorage:', 'info');
            
            // Пример rb_svod
            const rbSvodData = localStorage.getItem('rb_svod_almaty');
            if (rbSvodData) {
                const parsed = JSON.parse(rbSvodData);
                addLog('', 'info');
                addLog('=== rb_svod_almaty ===', 'info');
                addLog(`Структура: ${JSON.stringify(Object.keys(parsed), null, 2)}`, 'success');
                if (parsed.cells) {
                    const cellKeys = Object.keys(parsed.cells).slice(0, 10);
                    addLog(`Первые 10 ячеек: ${cellKeys.join(', ')}`, 'success');
                }
            }
            
            // Пример rb_svodnaya
            const rbSvodnayaData = localStorage.getItem('rb_svodnaya_almaty');
            if (rbSvodnayaData) {
                const parsed = JSON.parse(rbSvodnayaData);
                addLog('', 'info');
                addLog('=== rb_svodnaya_almaty ===', 'info');
                const keys = Object.keys(parsed).slice(0, 10);
                addLog(`Первые 10 ключей: ${keys.join(', ')}`, 'success');
            }
            
            // Пример pu_svod_2026
            const puSvodData = localStorage.getItem('pu_svod_2026_almaty');
            if (puSvodData) {
                const parsed = JSON.parse(puSvodData);
                addLog('', 'info');
                addLog('=== pu_svod_2026_almaty ===', 'info');
                addLog(`Структура: ${JSON.stringify(Object.keys(parsed), null, 2)}`, 'success');
                if (parsed.cells) {
                    const cellKeys = Object.keys(parsed.cells).slice(0, 10);
                    addLog(`Первые 10 ячеек: ${cellKeys.join(', ')}`, 'success');
                }
            }
        }
    </script>
</body>
</html>
