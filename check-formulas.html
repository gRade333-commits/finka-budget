<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка формул Excel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {text-align: center; color: #2c3e50; margin-bottom: 10px;}
        .subtitle {text-align: center; color: #7f8c8d; margin-bottom: 40px;}
        .file-section {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .btn {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            margin: 10px;
        }
        .btn:hover {background: #764ba2;}
        .results {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            max-height: 600px;
            overflow-y: auto;
        }
        .formula-item {
            padding: 10px;
            margin: 5px 0;
            background: white;
            border-left: 4px solid #667eea;
            border-radius: 4px;
        }
        .formula-cell {
            font-weight: bold;
            color: #667eea;
        }
        .formula-text {
            font-family: 'Courier New', monospace;
            color: #2c3e50;
        }
        .formula-value {
            color: #28a745;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
        }
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
    
        /* Mobile adaptation - Tablets */
        @media (max-width: 1200px) {
            .container {
                max-width: 100%;
            }
            
            .table-container {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
        }

        /* Mobile adaptation - Medium screens */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header, .container {
                padding: 15px 20px;
                margin-bottom: 15px;
            }

            h1 {
                font-size: 20px;
                margin-bottom: 8px;
            }

            h2 {
                font-size: 16px;
            }

            .subtitle {
                font-size: 12px;
            }

            .branch-selector, .btn-group, .controls {
                gap: 8px;
                margin-top: 10px;
            }

            .btn, button, .branch-btn {
                padding: 10px 16px;
                font-size: 12px;
            }

            .info-bar, .status-bar {
                padding: 12px 15px;
                gap: 10px;
            }
            
            table {
                font-size: 11px;
            }

            th, td {
                padding: 6px 4px;
            }

            .section-footer {
                padding: 12px;
                gap: 8px;
            }

            input, select, textarea {
                padding: 6px;
                font-size: 12px;
            }
        }

        /* Mobile adaptation - Small screens */
        @media (max-width: 480px) {
            body {
                padding: 5px;
            }

            .header, .container {
                padding: 12px 15px;
                border-radius: 10px;
            }

            h1 {
                font-size: 18px;
            }

            h2 {
                font-size: 14px;
            }

            .subtitle {
                font-size: 11px;
                margin-bottom: 10px;
            }

            .branch-selector, .btn-group, .controls {
                flex-direction: column;
                gap: 6px;
            }

            .btn, button, .branch-btn {
                width: 100%;
                padding: 10px;
                font-size: 13px;
            }

            .info-bar, .status-bar {
                flex-direction: column;
                padding: 10px;
                gap: 8px;
            }

            table {
                font-size: 10px;
            }

            th, td {
                padding: 4px 2px;
            }

            .section-footer {
                flex-direction: column;
                padding: 10px;
            }

            input, select, textarea {
                font-size: 11px;
                padding: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Вернуться на главную</a>
        
        <h1>🧮 Проверка формул Excel</h1>
        <p class="subtitle">Анализ формул в Excel файлах</p>

        <div class="file-section">
            <h3>Загрузите Excel файл для анализа формул:</h3>
            <input type="file" id="fileInput" accept=".xlsx,.xls" class="btn">
            <button class="btn" onclick="analyzeFormulas()">📊 Анализировать формулы</button>
        </div>

        <div class="stats" id="stats" style="display: none;">
            <div class="stat-card">
                <div class="stat-number" id="totalSheets">0</div>
                <div class="stat-label">Листов</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalFormulas">0</div>
                <div class="stat-label">Формул</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalCells">0</div>
                <div class="stat-label">Ячеек</div>
            </div>
        </div>

        <div class="results" id="results"></div>
    </div>

    <script>
        let workbook = null;

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                workbook = XLSX.read(data, {type: 'array', cellFormula: true, cellStyles: true});
                addResult(`✅ Файл загружен: ${file.name}`, 'success');
            };
            reader.readAsArrayBuffer(file);
        });

        function analyzeFormulas() {
            if (!workbook) {
                alert('Пожалуйста, загрузите Excel файл');
                return;
            }

            const results = document.getElementById('results');
            results.innerHTML = '<h2>📋 Результаты анализа формул:</h2>';

            let totalFormulas = 0;
            let totalCells = 0;

            workbook.SheetNames.forEach((sheetName, sheetIndex) => {
                const worksheet = workbook.Sheets[sheetName];
                const formulas = [];

                // Получаем все ячейки
                const range = XLSX.utils.decode_range(worksheet['!ref']);
                
                let cellCount = 0;
                let formulaCount = 0;

                // Проходим по всем ячейкам
                for (let R = range.s.r; R <= range.e.r; ++R) {
                    for (let C = range.s.c; C <= range.e.c; ++C) {
                        const cellAddress = XLSX.utils.encode_cell({r: R, c: C});
                        const cell = worksheet[cellAddress];
                        
                        if (cell) {
                            cellCount++;
                            
                            // Проверяем наличие формулы
                            if (cell.f) {
                                formulaCount++;
                                formulas.push({
                                    cell: cellAddress,
                                    formula: cell.f,
                                    value: cell.v,
                                    type: cell.t
                                });
                            }
                        }
                    }
                }

                totalFormulas += formulaCount;
                totalCells += cellCount;

                // Выводим результаты для листа
                const sheetDiv = document.createElement('div');
                sheetDiv.style.marginTop = '20px';
                sheetDiv.innerHTML = `
                    <h3 style="color: #667eea; margin-bottom: 10px;">
                        📄 Лист ${sheetIndex + 1}: "${sheetName}"
                    </h3>
                    <p style="color: #7f8c8d; margin-bottom: 10px;">
                        Всего ячеек: ${cellCount} | Формул: ${formulaCount}
                    </p>
                `;

                if (formulas.length > 0) {
                    const formulaList = document.createElement('div');
                    formulaList.style.marginTop = '10px';
                    
                    // Показываем первые 50 формул
                    const displayFormulas = formulas.slice(0, 50);
                    
                    displayFormulas.forEach(f => {
                        const item = document.createElement('div');
                        item.className = 'formula-item';
                        item.innerHTML = `
                            <span class="formula-cell">${f.cell}:</span>
                            <span class="formula-text"> =${f.formula}</span>
                            <span class="formula-value"> → ${f.value}</span>
                        `;
                        formulaList.appendChild(item);
                    });

                    if (formulas.length > 50) {
                        const moreInfo = document.createElement('p');
                        moreInfo.style.color = '#7f8c8d';
                        moreInfo.style.marginTop = '10px';
                        moreInfo.textContent = `... и еще ${formulas.length - 50} формул`;
                        formulaList.appendChild(moreInfo);
                    }

                    sheetDiv.appendChild(formulaList);
                } else {
                    const noFormulas = document.createElement('p');
                    noFormulas.style.color = '#dc3545';
                    noFormulas.textContent = '❌ Формулы не найдены';
                    sheetDiv.appendChild(noFormulas);
                }

                results.appendChild(sheetDiv);
            });

            // Обновляем статистику
            document.getElementById('stats').style.display = 'grid';
            document.getElementById('totalSheets').textContent = workbook.SheetNames.length;
            document.getElementById('totalFormulas').textContent = totalFormulas;
            document.getElementById('totalCells').textContent = totalCells;
        }

        function addResult(message, type = 'info') {
            const results = document.getElementById('results');
            const p = document.createElement('p');
            p.style.padding = '5px 0';
            p.style.color = type === 'success' ? '#28a745' : type === 'error' ? '#dc3545' : '#17a2b8';
            p.textContent = message;
            results.appendChild(p);
        }
    </script>
</body>
</html>
