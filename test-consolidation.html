<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест консолидации</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px; }
        button:hover { background: #2980b9; }
        pre { background: #f8f9fa; padding: 15px; border-radius: 5px; overflow-x: auto; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
    
        /* Mobile adaptation - Tablets */
        @media (max-width: 1200px) {
            .container {
                max-width: 100%;
            }
            
            .table-container {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
        }

        /* Mobile adaptation - Medium screens */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header, .container {
                padding: 15px 20px;
                margin-bottom: 15px;
            }

            h1 {
                font-size: 20px;
                margin-bottom: 8px;
            }

            h2 {
                font-size: 16px;
            }

            .subtitle {
                font-size: 12px;
            }

            .branch-selector, .btn-group, .controls {
                gap: 8px;
                margin-top: 10px;
            }

            .btn, button, .branch-btn {
                padding: 10px 16px;
                font-size: 12px;
            }

            .info-bar, .status-bar {
                padding: 12px 15px;
                gap: 10px;
            }
            
            table {
                font-size: 11px;
            }

            th, td {
                padding: 6px 4px;
            }

            .section-footer {
                padding: 12px;
                gap: 8px;
            }

            input, select, textarea {
                padding: 6px;
                font-size: 12px;
            }
        }

        /* Mobile adaptation - Small screens */
        @media (max-width: 480px) {
            body {
                padding: 5px;
            }

            .header, .container {
                padding: 12px 15px;
                border-radius: 10px;
            }

            h1 {
                font-size: 18px;
            }

            h2 {
                font-size: 14px;
            }

            .subtitle {
                font-size: 11px;
                margin-bottom: 10px;
            }

            .branch-selector, .btn-group, .controls {
                flex-direction: column;
                gap: 6px;
            }

            .btn, button, .branch-btn {
                width: 100%;
                padding: 10px;
                font-size: 13px;
            }

            .info-bar, .status-bar {
                flex-direction: column;
                padding: 10px;
                gap: 8px;
            }

            table {
                font-size: 10px;
            }

            th, td {
                padding: 4px 2px;
            }

            .section-footer {
                flex-direction: column;
                padding: 10px;
            }

            input, select, textarea {
                font-size: 11px;
                padding: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Тест консолидации localStorage</h1>
        
        <h3>Шаг 1: Создать тестовые данные</h3>
        <p>Создадим данные для 3 городов с ключом rb_svod_*</p>
        <button onclick="createTestData()">Создать тестовые данные</button>
        
        <h3>Шаг 2: Проверить что данные созданы</h3>
        <button onclick="checkData()">Проверить данные</button>
        
        <h3>Шаг 3: Тест консолидации</h3>
        <button onclick="testConsolidation()">Протестировать консолидацию</button>
        
        <h3>Шаг 4: Очистить тестовые данные</h3>
        <button onclick="clearTestData()">Очистить тестовые данные</button>
        
        <div id="result" style="margin-top: 20px;"></div>
    </div>

    <script>
        function createTestData() {
            // Создаём тестовые данные для 3 филиалов
            const testData = {
                almaty: {
                    branch: 'almaty',
                    sheet: 'rb_svod',
                    cells: {
                        'A1': '100',
                        'A2': '200',
                        'A3': '300'
                    }
                },
                uralsk: {
                    branch: 'uralsk',
                    sheet: 'rb_svod',
                    cells: {
                        'A1': '150',
                        'A2': '250',
                        'A3': '350'
                    }
                },
                astana: {
                    branch: 'astana',
                    sheet: 'rb_svod',
                    cells: {
                        'A1': '50',
                        'A2': '100',
                        'A3': '150'
                    }
                }
            };
            
            localStorage.setItem('rb_svod_almaty', JSON.stringify(testData.almaty));
            localStorage.setItem('rb_svod_uralsk', JSON.stringify(testData.uralsk));
            localStorage.setItem('rb_svod_astana', JSON.stringify(testData.astana));
            
            document.getElementById('result').innerHTML = `
                <div class="success">✅ Тестовые данные созданы!</div>
                <pre>Алматы: A1=100, A2=200, A3=300
Уральск: A1=150, A2=250, A3=350
Астана: A1=50, A2=100, A3=150

Ожидаемая консолидация:
A1 = 100 + 150 + 50 = 300
A2 = 200 + 250 + 100 = 550
A3 = 300 + 350 + 150 = 800</pre>
            `;
        }
        
        function checkData() {
            const almaty = localStorage.getItem('rb_svod_almaty');
            const uralsk = localStorage.getItem('rb_svod_uralsk');
            const astana = localStorage.getItem('rb_svod_astana');
            
            document.getElementById('result').innerHTML = `
                <h4>Данные в localStorage:</h4>
                <p><strong>rb_svod_almaty:</strong> ${almaty ? '✅ Найдено' : '❌ Нет данных'}</p>
                <p><strong>rb_svod_uralsk:</strong> ${uralsk ? '✅ Найдено' : '❌ Нет данных'}</p>
                <p><strong>rb_svod_astana:</strong> ${astana ? '✅ Найдено' : '❌ Нет данных'}</p>
                ${almaty ? `<pre>Алматы: ${almaty}</pre>` : ''}
                ${uralsk ? `<pre>Уральск: ${uralsk}</pre>` : ''}
                ${astana ? `<pre>Астана: ${astana}</pre>` : ''}
            `;
        }
        
        function testConsolidation() {
            // Симулируем логику loadConsolidatedData из rb-svod.html
            const branches = ['almaty', 'uralsk', 'astana'];
            const allData = {};
            
            branches.forEach(b => {
                const key = `rb_svod_${b}`;
                const saved = localStorage.getItem(key);
                if (saved) {
                    const data = JSON.parse(saved);
                    allData[b] = data.cells || {};
                }
            });
            
            // Тестовые cellId
            const testCells = ['A1', 'A2', 'A3'];
            const results = {};
            
            testCells.forEach(cellId => {
                let sum = 0;
                branches.forEach(b => {
                    if (allData[b] && allData[b][cellId]) {
                        sum += parseFloat(allData[b][cellId]) || 0;
                    }
                });
                results[cellId] = sum.toFixed(2);
            });
            
            document.getElementById('result').innerHTML = `
                <div class="success">✅ Тест консолидации завершён!</div>
                <h4>Результаты консолидации:</h4>
                <pre>A1 = ${results['A1']} (ожидается 300.00)
A2 = ${results['A2']} (ожидается 550.00)
A3 = ${results['A3']} (ожидается 800.00)</pre>
                
                <h4>Детальные данные по филиалам:</h4>
                <pre>${JSON.stringify(allData, null, 2)}</pre>
                
                ${results['A1'] === '300.00' && results['A2'] === '550.00' && results['A3'] === '800.00' 
                    ? '<div class="success">🎉 Консолидация работает ПРАВИЛЬНО!</div>' 
                    : '<div class="error">❌ Консолидация работает НЕПРАВИЛЬНО!</div>'}
            `;
        }
        
        function clearTestData() {
            localStorage.removeItem('rb_svod_almaty');
            localStorage.removeItem('rb_svod_uralsk');
            localStorage.removeItem('rb_svod_astana');
            
            document.getElementById('result').innerHTML = `
                <div class="success">✅ Тестовые данные удалены!</div>
            `;
        }
    </script>
</body>
</html>
